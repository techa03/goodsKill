server:
  port: 80
spring:
  profiles:
    active: dev
  application:
    name: goodskill-gateway
  config:
    import:
      - optional:nacos:goodskill-common-connection.yml
      - optional:nacos:goodskill-common.yml
  main:
    allow-bean-definition-overriding: true
  cloud:
    nacos:
      username: nacos
      password: nacos
      server-addr: nacos:8848
    sentinel:
      filter:
        ## 网关服务此项需配置为false（若在网关流控控制台上看到了 URL 资源，就是此配置项没有置为 false）
        enabled: false
      ##使用nacos配置中心存储限流规则
      datasource:
        ds0:
          nacos:
            rule-type: gw-flow
    gateway:
      ##开启网关日志监控
      httpserver:
        wiretap: true
      ##开启指标监控
#      metrics:
#        enabled: true
#        tags:
#          path:
#            enabled: true
      predicate:
        weight:
          enabled: false
      globalcors:
        cors-configurations:
          '[/**]':
            allowCredentials: true
            allowedOriginPatterns: "*"
            allowedHeaders: "*"
            allowedMethods: "*"
      httpclient:
        ssl:
          useInsecureTrustManager: true
        connect-timeout: 1000
        response-timeout: 5s
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: goodskill-admin
          uri: lb://goodskill-admin
          predicates:
            - Path=/admin/**
          filters:
            - StripPrefix=1
        - id: goodskill-common
          uri: lb://goodskill-common
          predicates:
            - Path=/api/common/**
          filters:
            - StripPrefix=2
        - id: goodskill-ai
          uri: lb://goodskill-ai
          predicates:
            - Path=/api/ai/**
          filters:
            - StripPrefix=2
        - id: prefixpath_route
          uri: lb://goodskill-web
          predicates:
            - Path=/api/test
          filters:
            - RedirectTo=302, https://www.baidu.com, true

management:
  endpoint:
    gateway:
      enabled: true

nacos:
  router:
    data:
      id: goodskill-gateway-routes

#接口白名单
security:
  ignore:
    ##普通接口白名单
    whiteUrl:
      - "/api/auth/login"
      - "/api/auth/refresh"
      - "/api/auth/register"
      - "/api/web/**"
      - "/doc.html"
      - "/webjars/**"
      - "/v3/api-docs"
      - "/api/order/pay/alipay/return"
    ##登录用户接口白名单
    loginUserWhiteUrls:
      - "/api/xxx"

logging:
  level:
    reactor.netty: info
