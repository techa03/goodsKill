<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>企业问答知识库</title>
  <style>
    :root {
      --bg-top: #f3efe5;
      --bg-bottom: #dae8f2;
      --panel: rgba(255, 255, 255, 0.9);
      --line: #c7d4de;
      --text: #1b2833;
      --muted: #526573;
      --brand: #035f7b;
      --brand-strong: #013f53;
      --danger: #a63131;
      --ok: #1e6d4f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "IBM Plex Sans", "PingFang SC", "Hiragino Sans GB", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 10% 20%, #fff7d7 0%, transparent 32%),
                  radial-gradient(circle at 90% 15%, #d6eef9 0%, transparent 28%),
                  linear-gradient(165deg, var(--bg-top), var(--bg-bottom));
      padding: 24px;
    }

    .shell {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      gap: 16px;
      grid-template-columns: 1.05fr 1fr;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 10px 28px rgba(14, 37, 49, 0.08);
      backdrop-filter: blur(8px);
    }

    h1 {
      margin: 0 0 8px;
      font-family: "Noto Serif SC", "Songti SC", serif;
      letter-spacing: 1px;
      font-size: 30px;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 20px;
    }

    .intro {
      grid-column: 1 / -1;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      animation: fadeIn 450ms ease;
    }

    .tag {
      font-size: 13px;
      color: #fff;
      background: linear-gradient(130deg, var(--brand), var(--brand-strong));
      padding: 7px 10px;
      border-radius: 999px;
      white-space: nowrap;
    }

    .muted { color: var(--muted); font-size: 13px; }

    textarea, input[type="text"], input[type="number"], input[type="file"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      margin-bottom: 10px;
      background: rgba(255, 255, 255, 0.95);
      color: var(--text);
    }

    textarea { min-height: 130px; resize: vertical; }

    button {
      border: none;
      border-radius: 10px;
      padding: 9px 14px;
      cursor: pointer;
      font-weight: 600;
      transition: transform 0.12s ease, opacity 0.2s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }

    .btn-main { color: #fff; background: var(--brand); }
    .btn-main:hover { background: var(--brand-strong); }
    .btn-danger { color: #fff; background: var(--danger); }
    .btn-sub { color: #fff; background: #3d7287; }

    .row { display: flex; gap: 8px; align-items: center; }

    .doc-list {
      margin-top: 8px;
      border: 1px solid var(--line);
      border-radius: 10px;
      max-height: 320px;
      overflow: auto;
      background: #fff;
    }

    .doc-item {
      padding: 10px 12px;
      border-bottom: 1px solid #e5edf2;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      animation: slideIn 260ms ease;
    }

    .doc-item:last-child { border-bottom: none; }
    .doc-item strong { font-size: 14px; display: block; }
    .doc-item small { color: var(--muted); }

    .chat-box {
      min-height: 400px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      overflow: auto;
      background: #fff;
      margin-bottom: 12px;
    }

    .msg {
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 10px;
      line-height: 1.55;
      white-space: pre-wrap;
    }

    .msg-user { background: #edf7fb; border: 1px solid #cfe5ef; }
    .msg-ai { background: #f6f7e9; border: 1px solid #e5e8bf; }

    .source {
      margin-top: 8px;
      border-top: 1px dashed #d3dce2;
      padding-top: 8px;
      font-size: 12px;
      color: var(--muted);
    }

    .notice { color: var(--ok); font-size: 13px; min-height: 20px; }
    .error { color: var(--danger); font-size: 13px; min-height: 20px; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-6px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @media (max-width: 980px) {
      .shell { grid-template-columns: 1fr; }
      .intro { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
<div class="shell">
  <section class="card intro">
    <div>
      <h1>企业问答知识库</h1>
      <div class="muted">后端：Spring Boot + Spring AI + Spring AI Alibaba（默认百炼 Qwen）</div>
    </div>
    <div class="tag">RAG 知识检索问答</div>
  </section>

  <section class="card">
    <h2>知识入库</h2>

    <form id="textForm">
      <input id="title" type="text" placeholder="知识标题（例如：员工报销制度）" required/>
      <textarea id="content" placeholder="粘贴企业知识内容" required></textarea>
      <button class="btn-main" type="submit">新增文本知识</button>
    </form>

    <hr/>

    <form id="fileForm">
      <input id="files" type="file" multiple accept=".txt,.md,.csv,.json,.log"/>
      <div class="row">
        <button class="btn-sub" type="submit">上传文件入库</button>
        <span class="muted">按 UTF-8 文本解析</span>
      </div>
    </form>

    <div id="kbNotice" class="notice"></div>
    <div id="kbError" class="error"></div>

    <h2 style="margin-top:16px">已入库文档</h2>
    <div id="docList" class="doc-list"></div>
  </section>

  <section class="card">
    <h2>问答助手</h2>
    <div id="chatBox" class="chat-box"></div>

    <form id="askForm">
      <textarea id="question" placeholder="请输入问题，例如：2026 年差旅报销标准是什么？" required></textarea>
      <div class="row">
        <input id="topK" type="number" min="1" max="10" value="4" style="max-width: 100px"/>
        <button class="btn-main" type="submit">提问</button>
      </div>
    </form>
    <div id="qaError" class="error"></div>
  </section>
</div>

<script>
  const docListEl = document.getElementById('docList');
  const chatBoxEl = document.getElementById('chatBox');
  const kbNoticeEl = document.getElementById('kbNotice');
  const kbErrorEl = document.getElementById('kbError');
  const qaErrorEl = document.getElementById('qaError');
  const askFormEl = document.getElementById('askForm');
  const askButtonEl = askFormEl.querySelector('button[type="submit"]');
  const questionEl = document.getElementById('question');

  async function loadDocs() {
    const res = await fetch('/api/knowledge');
    if (!res.ok) throw new Error('加载文档失败');
    const docs = await res.json();
    if (!docs.length) {
      docListEl.innerHTML = '<div class="doc-item"><small>暂无文档</small></div>';
      return;
    }
    docListEl.innerHTML = docs.map(doc => `
      <div class="doc-item">
        <div>
          <strong>${escapeHtml(doc.title)}</strong>
          <small>ID: ${doc.id} | 分块: ${doc.chunkCount} | 创建时间: ${new Date(doc.createdAt).toLocaleString()}</small>
        </div>
        <button class="btn-danger" onclick="deleteDoc(${doc.id})">删除</button>
      </div>
    `).join('');
  }

  async function deleteDoc(id) {
    kbErrorEl.textContent = '';
    kbNoticeEl.textContent = '';
    const res = await fetch(`/api/knowledge/${id}`, { method: 'DELETE' });
    if (!res.ok) {
      kbErrorEl.textContent = '删除失败';
      return;
    }
    kbNoticeEl.textContent = `已删除文档 ${id}`;
    await loadDocs();
  }

  function addMessage(text, role, sources = []) {
    const div = document.createElement('div');
    div.className = `msg ${role === 'user' ? 'msg-user' : 'msg-ai'}`;
    div.textContent = text;

    if (sources.length) {
      const sourceDiv = document.createElement('div');
      sourceDiv.className = 'source';
      sourceDiv.innerHTML = sources.map(s =>
        `[D${s.documentId}-C${s.chunkIndex}] ${escapeHtml(s.documentTitle)} | 相似度: ${(s.score || 0).toFixed(4)}<br/>${escapeHtml(s.snippet)}`
      ).join('<br/><br/>');
      div.appendChild(sourceDiv);
    }

    chatBoxEl.appendChild(div);
    chatBoxEl.scrollTop = chatBoxEl.scrollHeight;
  }

  function setAskBusy(busy) {
    askButtonEl.disabled = busy;
    questionEl.disabled = busy;
    askButtonEl.style.opacity = busy ? '0.7' : '1';
    askButtonEl.textContent = busy ? '生成中...' : '提问';
  }

  function renderSources(sources) {
    if (!sources || !sources.length) {
      return '';
    }
    return sources.map(s =>
      `[D${s.documentId}-C${s.chunkIndex}] ${escapeHtml(s.documentTitle)} | 相似度: ${(s.score || 0).toFixed(4)}<br/>${escapeHtml(s.snippet)}`
    ).join('<br/><br/>');
  }

  function createStreamingAiMessage() {
    const wrapper = document.createElement('div');
    wrapper.className = 'msg msg-ai';

    const textEl = document.createElement('div');
    wrapper.appendChild(textEl);

    const sourceEl = document.createElement('div');
    sourceEl.className = 'source';
    sourceEl.style.display = 'none';
    wrapper.appendChild(sourceEl);

    chatBoxEl.appendChild(wrapper);
    chatBoxEl.scrollTop = chatBoxEl.scrollHeight;

    let queue = '';
    let timerId = null;

    function startTyping() {
      if (timerId) return;
      timerId = setInterval(() => {
        if (!queue.length) {
          clearInterval(timerId);
          timerId = null;
          return;
        }
        textEl.textContent += queue.charAt(0);
        queue = queue.slice(1);
        chatBoxEl.scrollTop = chatBoxEl.scrollHeight;
      }, 18);
    }

    return {
      appendToken(token) {
        if (!token) return;
        queue += token;
        startTyping();
      },
      async flush() {
        while (queue.length || timerId) {
          await new Promise(resolve => setTimeout(resolve, 20));
        }
      },
      async done(sources) {
        await this.flush();
        const sourceHtml = renderSources(sources);
        if (sourceHtml) {
          sourceEl.innerHTML = sourceHtml;
          sourceEl.style.display = 'block';
        }
      }
    };
  }

  function escapeHtml(str) {
    return String(str || '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#039;');
  }

  document.getElementById('textForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    kbErrorEl.textContent = '';
    kbNoticeEl.textContent = '';

    const payload = {
      title: document.getElementById('title').value,
      content: document.getElementById('content').value
    };

    const res = await fetch('/api/knowledge/text', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      kbErrorEl.textContent = err.message || err.details || '文本入库失败';
      return;
    }

    kbNoticeEl.textContent = '文本知识入库成功';
    document.getElementById('textForm').reset();
    await loadDocs();
  });

  document.getElementById('fileForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    kbErrorEl.textContent = '';
    kbNoticeEl.textContent = '';

    const filesInput = document.getElementById('files');
    if (!filesInput.files.length) {
      kbErrorEl.textContent = '请选择至少一个文件';
      return;
    }

    const form = new FormData();
    for (const file of filesInput.files) {
      form.append('files', file);
    }

    const res = await fetch('/api/knowledge/files', {
      method: 'POST',
      body: form
    });

    if (!res.ok) {
      kbErrorEl.textContent = '文件入库失败';
      return;
    }

    const data = await res.json();
    kbNoticeEl.textContent = `已入库 ${data.length} 个文件`;
    document.getElementById('fileForm').reset();
    await loadDocs();
  });

  askFormEl.addEventListener('submit', async (e) => {
    e.preventDefault();
    qaErrorEl.textContent = '';
    setAskBusy(true);

    const question = questionEl.value;
    const topK = Number(document.getElementById('topK').value || 4);

    addMessage(question, 'user');
    const streamingMsg = createStreamingAiMessage();

    try {
      const res = await fetch('/api/qa/ask/stream', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Accept': 'text/event-stream'
        },
        body: JSON.stringify({ question, topK })
      });

      if (!res.ok || !res.body) {
        qaErrorEl.textContent = '提问失败，请检查百炼 API Key 是否已配置';
        return;
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder('utf-8');
      let buffer = '';
      let finished = false;

      async function handleSseBlock(raw) {
        if (!raw) return;
        let eventType = 'message';
        const dataLines = [];

        for (const rawLine of raw.split('\n')) {
          const line = rawLine.trimEnd();
          if (!line || line.startsWith(':')) continue;
          if (line.startsWith('event:')) {
            eventType = line.slice(6).trim();
          } else if (line.startsWith('data:')) {
            dataLines.push(line.slice(5).trimStart());
          }
        }

        if (!dataLines.length) return;

        const payloadText = dataLines.join('\n');
        let payload;
        try {
          payload = JSON.parse(payloadText);
        } catch {
          payload = { token: payloadText, message: payloadText };
        }

        if (eventType === 'token') {
          streamingMsg.appendToken(payload.token || '');
        } else if (eventType === 'done') {
          finished = true;
          await streamingMsg.done(payload.sources || []);
        } else if (eventType === 'error') {
          throw new Error(payload.message || '流式问答失败');
        }
      }

      while (true) {
        const { value, done } = await reader.read();
        buffer += decoder.decode(value || new Uint8Array(), { stream: !done });

        let index;
        while ((index = buffer.indexOf('\n\n')) >= 0) {
          const block = buffer.slice(0, index).trim();
          buffer = buffer.slice(index + 2);
          await handleSseBlock(block);
        }

        if (done) {
          const rest = buffer.trim();
          if (rest) {
            await handleSseBlock(rest);
          }
          break;
        }
      }

      if (!finished) {
        await streamingMsg.done([]);
      }
      questionEl.value = '';
    } catch (err) {
      qaErrorEl.textContent = err.message || '流式问答失败';
    } finally {
      setAskBusy(false);
    }
  });

  loadDocs().catch(err => {
    kbErrorEl.textContent = err.message || '初始化失败';
  });
</script>
</body>
</html>
